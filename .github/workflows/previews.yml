---
name: Previews

#on:
#  pull_request:
#    types: [opened, synchronize, reopened, closed]
on:
  workflow_call:
    inputs:
      aws-region:
        description: The AWS region to use.
        required: true
        type: string
      aws-role-to-assume:
        description: The AWS role to assume.
        required: true
        type: string
      bucket:
        description: The S3 Bucket to publish to.
        required: true
        type: string
      directory:
        description: The directory to copy to s3.
        required: true
        type: string
      domain:
        description: The base previews domain.
        required: true
        type: string

permissions:
  id-token: write
  pull-requests: write

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # ratchet:aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ inputs.aws-role-to-assume }}

      - name: Copy to S3 Bucket
        run: aws s3 sync ${{ inputs.directory }} s3://${{ inputs.bucket }}/${{ github.event.repository.name }}-pr-${{ github.event.number }} --delete

      - name: Comment PR with preview URL
        uses: marocchino/sticky-pull-request-comment@447031a6bb83f7438d890bb0136932be78342022 # ratchet:marocchino/sticky-pull-request-comment@v3.0.0
        with:
          message: |
            🚀 Preview for PR #${{ github.event.number }} is ready:
            👉 https://${{ github.event.repository.name }}-pr-${{ github.event.number }}.${{ inputs.domain }}

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # ratchet:aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ inputs.aws-role-to-assume }}

      - name: Remove from S3 Bucket
        run: aws s3 rm s3://${{ inputs.bucket }}/${{ github.event.repository.name }}-pr-${{ github.event.number }} --recursive

      - name: Comment PR cleanup
        uses: marocchino/sticky-pull-request-comment@447031a6bb83f7438d890bb0136932be78342022 # ratchet:marocchino/sticky-pull-request-comment@v3.0.0
        with:
          message: |
            🧹 Preview for PR #${{ github.event.number }} has been removed.
